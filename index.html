<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company | AI Web Architect</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .header { text-align: center; margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; display: none; }
        #result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; display: none; word-break: break-all; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,.1); border-radius: 50%; border-top-color: #007bff; animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <small>Michael Eleven AKA MEDIATOR Presents</small>
        <h1>Company</h1>
        <p>AI-Powered Full-Stack Architect</p>
    </div>

    <label for="prompt">Describe your website idea:</label>
    <textarea id="prompt" placeholder="e.g., Create an outdoor activity sharing website with user login..."></textarea>
    
    <button id="generateBtn" onclick="generateSite()">Build My Website</button>

    <div id="status">
        <div class="spinner"></div>
        <span>AI is generating frontend, backend, and database...</span>
    </div>

    <div id="result">
        <strong>Success! Your site is live:</strong><br>
        <a id="siteLink" href="#" target="_blank"></a>
    </div>

    <script>
        function generateSite() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt) return alert("Please describe your website first.");

            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const link = document.getElementById('siteLink');

            // UI Reset
            btn.disabled = true;
            status.style.display = 'block';
            result.style.display = 'none';

            // Simulate AI Processing (3 seconds)
            setTimeout(() => {
                status.style.display = 'none';
                btn.disabled = false;
                
                // Mock URL Generation
                const slug = prompt.toLowerCase().replace(/[^a-z0-9]/g, '-').substring(0, 10);
                const finalUrl = `https://${slug || 'site'}-omnibuild.live`;
                
                link.href = finalUrl;
                link.innerText = finalUrl;
                result.style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
